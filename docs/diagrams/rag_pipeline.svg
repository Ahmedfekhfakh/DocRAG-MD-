<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -10 960 500" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="-10" y="-10" width="960" height="500" rx="12" fill="#ffffff"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#1e1e1e"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#22c55e"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="470" y="18" text-anchor="middle" font-size="22" font-weight="700" fill="#1e1e1e">RAG Pipeline — Per-Agent Flow</text>

  <!-- Retry label + loop -->
  <text x="580" y="40" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">retry (max 2)</text>
  <path d="M885 290 L920 290 L920 46 L85 46 L85 72" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arr-r)"/>

  <!-- ===== USER QUERY + MODE DECISION ===== -->
  <rect x="20" y="110" width="120" height="48" rx="6" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="80" y="139" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">User Query</text>

  <line x1="140" y1="134" x2="172" y2="134" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Mode diamond -->
  <polygon points="200,134 228,112 256,134 228,156" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="228" y="138" text-anchor="middle" font-size="11" font-weight="600" fill="#1e1e1e">mode</text>

  <!-- ===== 3 RETRIEVAL PATHS ===== -->

  <!-- Path 1: rag / hybrid — HyDE + Hybrid Search (parallel) -->
  <line x1="256" y1="122" x2="290" y2="82" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Parallel zone -->
  <rect x="292" y="56" width="290" height="68" rx="8" fill="#f3f0ff" fill-opacity="0.5" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="437" y="70" text-anchor="middle" font-size="10" font-weight="600" fill="#8b5cf6">parallel (asyncio.gather)</text>
  <rect x="300" y="78" width="90" height="30" rx="5" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="345" y="97" text-anchor="middle" font-size="12" font-weight="600" fill="#1e1e1e">HyDE</text>
  <line x1="390" y1="93" x2="410" y2="93" stroke="#1e1e1e" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="412" y="78" width="130" height="30" rx="5" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.2"/>
  <text x="477" y="97" text-anchor="middle" font-size="12" font-weight="600" fill="#1e1e1e">Hybrid Search</text>
  <text x="300" y="138" font-size="10" fill="#4a9eed" font-weight="600">rag / hybrid</text>

  <!-- Path 2: graph — Graph Search only -->
  <line x1="256" y1="134" x2="290" y2="148" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="292" y="134" width="145" height="30" rx="5" fill="#c3fae8" stroke="#06b6d4" stroke-width="1.2"/>
  <text x="365" y="153" text-anchor="middle" font-size="12" font-weight="600" fill="#1e1e1e">Graph Search</text>
  <text x="448" y="153" font-size="10" fill="#06b6d4" font-weight="600">PrimeKG</text>
  <text x="300" y="178" font-size="10" fill="#06b6d4" font-weight="600">graph / hybrid</text>

  <!-- Path 3: deep_search — PubMed -->
  <line x1="256" y1="146" x2="290" y2="206" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="292" y="192" width="145" height="30" rx="5" fill="#ffd8a8" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="365" y="211" text-anchor="middle" font-size="12" font-weight="600" fill="#1e1e1e">Deep Search</text>
  <text x="448" y="211" font-size="10" fill="#f59e0b" font-weight="600">PubMed</text>
  <text x="300" y="235" font-size="10" fill="#f59e0b" font-weight="600">deep_search</text>

  <!-- ===== MERGE INTO ROW 2 ===== -->
  <!-- Merge arrows from 3 paths to Rerank -->
  <path d="M542 93 L600 93 L600 200 L105 200 L105 262" fill="none" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M437 164 L580 164 L580 210 L115 210 L115 262" fill="none" stroke="#1e1e1e" stroke-width="1.5"/>
  <path d="M437 207 L560 207 L560 220 L125 220 L125 262" fill="none" stroke="#1e1e1e" stroke-width="1.5"/>

  <!-- ===== ROW 2: PROCESSING (always runs) ===== -->
  <!-- Rerank -->
  <rect x="35" y="264" width="130" height="48" rx="6" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="100" y="293" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">Rerank</text>
  <text x="100" y="326" text-anchor="middle" font-size="11" fill="#757575">MiniLM (async)</text>

  <line x1="165" y1="288" x2="198" y2="288" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- CRAG Gate -->
  <rect x="200" y="264" width="130" height="48" rx="6" fill="#ffc9c9" stroke="#ef4444" stroke-width="1.5"/>
  <text x="265" y="293" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">CRAG Gate</text>
  <text x="265" y="326" text-anchor="middle" font-size="11" fill="#757575">sigmoid > 0.60</text>

  <line x1="330" y1="288" x2="363" y2="288" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Assembly -->
  <rect x="365" y="264" width="140" height="48" rx="6" fill="#c3fae8" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="435" y="293" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">Assembly</text>
  <text x="435" y="326" text-anchor="middle" font-size="11" fill="#757575">dedup + lost-in-middle</text>

  <line x1="505" y1="288" x2="538" y2="288" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Generate -->
  <rect x="540" y="264" width="130" height="48" rx="6" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="605" y="293" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">Generate</text>
  <text x="605" y="326" text-anchor="middle" font-size="11" fill="#757575">selected LLM</text>

  <line x1="670" y1="288" x2="728" y2="288" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Self-Reflect -->
  <rect x="730" y="264" width="155" height="48" rx="6" fill="#eebefa" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="808" y="293" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">Self-Reflect</text>
  <text x="808" y="326" text-anchor="middle" font-size="11" fill="#757575">faithful? complete?</text>

  <!-- Pass → Output -->
  <line x1="808" y1="312" x2="808" y2="360" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="828" y="342" font-size="12" font-weight="600" fill="#22c55e">pass</text>
  <rect x="755" y="364" width="115" height="42" rx="6" fill="#b2f2bb" stroke="#22c55e" stroke-width="1.5"/>
  <text x="813" y="390" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">Output</text>
</svg>
