<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="940" height="480" rx="12" fill="#ffffff"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#1e1e1e"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#22c55e"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="470" y="24" text-anchor="middle" font-size="22" font-weight="700" fill="#1e1e1e">RAG Pipeline — Per-Agent Flow</text>

  <!-- ===== ROW 1: User Query → mode ===== -->
  <rect x="350" y="46" width="130" height="42" rx="6" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="415" y="72" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">User Query</text>

  <line x1="415" y1="88" x2="415" y2="108" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Mode diamond (bigger) -->
  <polygon points="415,112 448,136 415,160 382,136" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="415" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#1e1e1e">mode</text>

  <!-- ===== ROW 2: Three retrieval paths side by side ===== -->

  <!-- Arrows from diamond to 3 paths -->
  <path d="M390 148 L160 170" fill="none" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="415" y1="160" x2="415" y2="170" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M440 148 L700 170" fill="none" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Path 1 (left): rag / hybrid — HyDE + Hybrid Search parallel -->
  <rect x="18" y="174" width="285" height="68" rx="8" fill="#f3f0ff" fill-opacity="0.6" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="160" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#8b5cf6">parallel (asyncio.gather)</text>
  <rect x="28" y="198" width="85" height="32" rx="5" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="71" y="218" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">HyDE</text>
  <line x1="113" y1="214" x2="133" y2="214" stroke="#1e1e1e" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="136" y="198" width="155" height="32" rx="5" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.2"/>
  <text x="214" y="218" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">Hybrid Search</text>
  <text x="160" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#4a9eed">rag / hybrid</text>

  <!-- Path 2 (center): graph / hybrid — Graph Search -->
  <rect x="330" y="174" width="170" height="68" rx="8" fill="#c3fae8" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="415" y="202" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">Graph Search</text>
  <text x="415" y="222" text-anchor="middle" font-size="12" fill="#0e7490">PrimeKG</text>
  <text x="415" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#06b6d4">graph / hybrid</text>

  <!-- Path 3 (right): deep_search — PubMed -->
  <rect x="620" y="174" width="185" height="68" rx="8" fill="#ffd8a8" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="713" y="202" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">Deep Search</text>
  <text x="713" y="222" text-anchor="middle" font-size="12" fill="#92400e">PubMed E-utilities</text>
  <text x="713" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#f59e0b">deep_search</text>

  <!-- ===== MERGE: 3 paths → Rerank ===== -->
  <line x1="160" y1="242" x2="160" y2="280" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="415" y1="242" x2="415" y2="268" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="713" y1="242" x2="713" y2="268" stroke="#1e1e1e" stroke-width="1.5"/>
  <!-- Horizontal merge line -->
  <line x1="160" y1="280" x2="713" y2="280" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="415" y1="268" x2="415" y2="280" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="713" y1="268" x2="713" y2="280" stroke="#1e1e1e" stroke-width="1.5"/>
  <!-- Single arrow down from merge to row 3 -->
  <line x1="100" y1="280" x2="100" y2="300" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="100" y1="280" x2="160" y2="280" stroke="#1e1e1e" stroke-width="1.5"/>

  <!-- ===== ROW 3: Processing pipeline ===== -->
  <rect x="35" y="304" width="115" height="44" rx="6" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="93" y="330" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">Rerank</text>
  <text x="93" y="360" text-anchor="middle" font-size="10" fill="#757575">MiniLM (async)</text>

  <line x1="150" y1="326" x2="178" y2="326" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="180" y="304" width="120" height="44" rx="6" fill="#ffc9c9" stroke="#ef4444" stroke-width="1.5"/>
  <text x="240" y="330" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">CRAG Gate</text>
  <text x="240" y="360" text-anchor="middle" font-size="10" fill="#757575">sigmoid > 0.60</text>

  <line x1="300" y1="326" x2="328" y2="326" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="330" y="304" width="130" height="44" rx="6" fill="#c3fae8" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="395" y="330" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">Assembly</text>
  <text x="395" y="360" text-anchor="middle" font-size="10" fill="#757575">dedup + lost-in-middle</text>

  <line x1="460" y1="326" x2="498" y2="326" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="500" y="304" width="120" height="44" rx="6" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="560" y="330" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">Generate</text>
  <text x="560" y="360" text-anchor="middle" font-size="10" fill="#757575">selected LLM</text>

  <line x1="620" y1="326" x2="668" y2="326" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="670" y="304" width="145" height="44" rx="6" fill="#eebefa" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="743" y="330" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">Self-Reflect</text>
  <text x="743" y="360" text-anchor="middle" font-size="10" fill="#757575">faithful? complete?</text>

  <!-- Pass → Output -->
  <line x1="743" y1="348" x2="743" y2="392" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="762" y="378" font-size="11" font-weight="600" fill="#22c55e">pass</text>
  <rect x="690" y="396" width="110" height="38" rx="6" fill="#b2f2bb" stroke="#22c55e" stroke-width="1.5"/>
  <text x="745" y="420" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Output</text>

  <!-- Retry loop: Self-Reflect right → up → back to User Query -->
  <path d="M815 326 L850 326 L850 52 L480 52 L480 62" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arr-r)"/>
  <text x="870" y="200" font-size="11" font-weight="600" fill="#ef4444" transform="rotate(90,870,200)">retry (max 2)</text>
</svg>
