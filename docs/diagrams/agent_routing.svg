<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -10 870 480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="-10" y="-10" width="870" height="480" rx="12" fill="#ffffff"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#1e1e1e"/>
    </marker>
    <filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>

  <!-- Title -->
  <text x="415" y="18" text-anchor="middle" font-size="22" font-weight="700" fill="#1e1e1e">Agent Routing — Intent Classification</text>

  <!-- User Query -->
  <rect x="340" y="42" width="160" height="44" rx="6" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5" filter="url(#s)"/>
  <text x="420" y="70" text-anchor="middle" font-size="16" font-weight="600" fill="#1e1e1e">User Query</text>

  <!-- Arrow -->
  <line x1="420" y1="86" x2="420" y2="108" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- classify_intent -->
  <rect x="305" y="112" width="230" height="44" rx="6" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#s)"/>
  <text x="420" y="139" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">classify_intent (LLM)</text>

  <!-- Arrow -->
  <line x1="420" y1="156" x2="420" y2="182" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Route diamond -->
  <polygon points="420,184 455,207 420,230 385,207" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="420" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#1e1e1e">intent</text>

  <!-- Arrows to agents -->
  <line x1="392" y1="225" x2="120" y2="268" stroke="#ef4444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="407" y1="230" x2="320" y2="268" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="433" y1="230" x2="518" y2="268" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="448" y1="225" x2="712" y2="268" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== Agent Card 1: Diagnosis ===== -->
  <rect x="20" y="272" width="195" height="100" rx="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="1.5" filter="url(#s)"/>
  <text x="118" y="298" text-anchor="middle" font-size="18" font-weight="700" fill="#991b1b">Diagnosis</text>
  <text x="118" y="316" text-anchor="middle" font-size="12" fill="#1e1e1e">Symptoms, differentials,</text>
  <text x="118" y="331" text-anchor="middle" font-size="12" fill="#1e1e1e">clinical reasoning</text>
  <line x1="40" y1="340" x2="196" y2="340" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
  <text x="118" y="358" text-anchor="middle" font-size="10" fill="#757575">disease_phenotype_positive</text>
  <text x="118" y="370" text-anchor="middle" font-size="10" fill="#757575">disease_disease</text>

  <!-- ===== Agent Card 2: Pharmacology ===== -->
  <rect x="228" y="272" width="195" height="100" rx="8" fill="#ffd8a8" stroke="#f59e0b" stroke-width="1.5" filter="url(#s)"/>
  <text x="326" y="298" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e">Pharmacology</text>
  <text x="326" y="316" text-anchor="middle" font-size="12" fill="#1e1e1e">Drugs, interactions,</text>
  <text x="326" y="331" text-anchor="middle" font-size="12" fill="#1e1e1e">contraindications, dosing</text>
  <line x1="248" y1="340" x2="404" y2="340" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <text x="326" y="358" text-anchor="middle" font-size="10" fill="#757575">contraindication, indication</text>
  <text x="326" y="370" text-anchor="middle" font-size="10" fill="#757575">drug_drug, off-label use</text>

  <!-- ===== Agent Card 3: General ===== -->
  <rect x="436" y="272" width="170" height="100" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="1.5" filter="url(#s)"/>
  <text x="521" y="298" text-anchor="middle" font-size="18" font-weight="700" fill="#15803d">General</text>
  <text x="521" y="316" text-anchor="middle" font-size="12" fill="#1e1e1e">Standard medical</text>
  <text x="521" y="331" text-anchor="middle" font-size="12" fill="#1e1e1e">Q&A</text>
  <line x1="456" y1="340" x2="586" y2="340" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
  <text x="521" y="358" text-anchor="middle" font-size="10" fill="#757575">All medical relations</text>

  <!-- ===== Agent Card 4: Evaluator ===== -->
  <rect x="620" y="272" width="180" height="100" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#s)"/>
  <text x="710" y="298" text-anchor="middle" font-size="18" font-weight="700" fill="#5b21b6">Evaluator</text>
  <text x="710" y="316" text-anchor="middle" font-size="12" fill="#1e1e1e">MedMCQA benchmark</text>
  <text x="710" y="331" text-anchor="middle" font-size="12" fill="#1e1e1e">accuracy reporting</text>
  <line x1="640" y1="340" x2="780" y2="340" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="710" y="358" text-anchor="middle" font-size="10" fill="#757575">No KG relations</text>

  <!-- Pipeline note at bottom -->
  <rect x="100" y="400" width="640" height="32" rx="6" fill="#c3fae8" fill-opacity="0.5" stroke="#06b6d4" stroke-width="1"/>
  <text x="420" y="421" text-anchor="middle" font-size="12" font-weight="600" fill="#0e7490">Each agent runs: query_transform > search > graph_search > rerank > CRAG > generate > self_reflect</text>
</svg>
